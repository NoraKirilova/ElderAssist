<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>ElderAssist</title>
</head>
<body>
    <header>
        <h1><a href="{% url 'accounts:profile' %}">ElderAssist</a></h1>

        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'accounts:profile' %}">Моят профил</a>
                <a href="{% url 'accounts:profile_edit' %}">Редактирай профил</a>

                <form method="post" action="{% url 'logout' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Изход</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Вход</a>
                <a href="{% url 'accounts:signup' %}">Регистрация</a>
            {% endif %}
        </nav>
    </header>

    <hr>

    {% block content %}
    {% endblock %}
</body>
</html>
